<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <style>
    body { width: 200px; padding: 15px; font-family: sans-serif; text-align: center; }
    input { width: 100%; padding: 5px; margin-bottom: 10px; box-sizing: border-box; text-align: center; font-size: 16px; }
    button { width: 100%; padding: 8px; margin-bottom: 5px; cursor: pointer; background-color: #00a1d6; color: white; border: none; border-radius: 4px; font-weight: bold; }
    button:hover { background-color: #008cb9; }
    
    /* 快捷按钮的横向排版 */
    .quick-btn-group { display: flex; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
    .quick-btn { background-color: #ff85ad; margin-bottom: 0; }
    .quick-btn:hover { background-color: #e06c92; }
    
    #resetBtn { background-color: #999; }
    #resetBtn:hover { background-color: #777; }
  </style>
</head>
<body>
  <h4 style="margin-top: 0; color: #333;">设置播放倍速</h4>
  
  <input type="number" id="speedInput" min="0" max="16" step="0.5" value="3.0" placeholder="输入倍数">

  <div class="quick-btn-group">
    <button class="quick-btn" data-speed="3">3.0x</button>
    <button class="quick-btn" data-speed="4">4.0x</button>
  </div>

  <button id="applyBtn">应用自定义</button>
  <button id="resetBtn">恢复 1.0x</button>

  <script src="popup.js"></script>
</body>
</html>
